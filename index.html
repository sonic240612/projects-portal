<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
    --card-border: 1px solid #e8ecf1;
    --text: #1a1a2e;
    --text-secondary: #555;
    --accent: #4361ee;
    --accent-hover: #3a56d4;
    --header-bg: rgba(255,255,255,0.8);
    --toggle-bg: #e8ecf1;
    --toggle-color: #333;
    --particles: none;
    --glow: none;
  }
  [data-theme="simple"][data-mode="dark"] {
    --bg: #12121e;
    --card-bg: #1e1e32;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.35);
    --card-border: 1px solid #2e2e4a;
    --text: #e0e0ee;
    --text-secondary: #8888aa;
    --accent: #6b8cff;
    --accent-hover: #8ba8ff;
    --header-bg: rgba(18,18,30,0.88);
    --toggle-bg: #2a2a44;
    --toggle-color: #e0e0ee;
  }
  [data-theme="animated"] {
    --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    --card-bg: rgba(255,255,255,0.06);
    --card-shadow: 0 8px 32px rgba(0,0,0,0.3);
    --card-border: 1px solid rgba(255,255,255,0.10);
    --text: #f0f0ff;
    --text-secondary: #b0b0d0;
    --accent: #7c5cfc;
    --accent-hover: #9b7fff;
    --header-bg: rgba(15,12,41,0.7);
    --toggle-bg: rgba(255,255,255,0.10);
    --toggle-color: #f0f0ff;
    --particles: block;
    --glow: 0 0 30px rgba(124,92,252,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.6s ease, color 0.4s ease;
    position: relative;
    overflow-x: hidden;
  }

  #particles {
    display: var(--particles);
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
  .particle:nth-child(1) { left: 10%; width: 3px; height: 3px; animation-duration: 12s; animation-delay: 0s; }
  .particle:nth-child(2) { left: 25%; width: 5px; height: 5px; animation-duration: 18s; animation-delay: 2s; }
  .particle:nth-child(3) { left: 40%; width: 2px; height: 2px; animation-duration: 14s; animation-delay: 5s; }
  .particle:nth-child(4) { left: 55%; width: 4px; height: 4px; animation-duration: 20s; animation-delay: 1s; }
  .particle:nth-child(5) { left: 70%; width: 3px; height: 3px; animation-duration: 16s; animation-delay: 7s; }
  .particle:nth-child(6) { left: 85%; width: 5px; height: 5px; animation-duration: 22s; animation-delay: 3s; }
  .particle:nth-child(7) { left: 50%; width: 2px; height: 2px; animation-duration: 15s; animation-delay: 9s; }
  .particle:nth-child(8) { left: 15%; width: 4px; height: 4px; animation-duration: 19s; animation-delay: 4s; }
  .particle:nth-child(9) { left: 65%; width: 3px; height: 3px; animation-duration: 13s; animation-delay: 6s; }
  .particle:nth-child(10) { left: 90%; width: 5px; height: 5px; animation-duration: 17s; animation-delay: 8s; }
  .particle:nth-child(11) { left: 35%; width: 2px; height: 2px; animation-duration: 21s; animation-delay: 2s; }
  .particle:nth-child(12) { left: 75%; width: 4px; height: 4px; animation-duration: 14s; animation-delay: 5s; }

  header {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 32px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: var(--header-bg);
    border-bottom: var(--card-border);
    transition: background 0.5s ease, border 0.4s ease;
  }
  header .title-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header .title-area a {
    display: flex;
    align-items: center;
    color: var(--text-secondary);
    transition: color 0.25s ease, transform 0.25s ease;
  }
  header .title-area a:hover {
    color: var(--accent);
    transform: scale(1.12);
  }
  header .title-area a svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #mode-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: var(--card-border);
    background: var(--toggle-bg);
    color: var(--toggle-color);
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
    flex-shrink: 0;
  }
  #mode-toggle:hover {
    transform: scale(1.08);
    box-shadow: var(--glow);
  }
  #mode-toggle svg {
    width: 20px;
    height: 20px;
    display: block;
  }
  [data-theme="animated"] #mode-toggle {
    display: none;
  }
  #theme-toggle {
    position: relative;
    z-index: 2;
    appearance: none;
    border: var(--card-border);
    background: var(--toggle-bg);
    color: var(--toggle-color);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
  }
  #theme-toggle:hover {
    transform: scale(1.04);
    box-shadow: var(--glow);
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 60px auto;
    padding: 0 24px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
  }
  .card {
    background: var(--card-bg);
    border: var(--card-border);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: var(--card-shadow), var(--glow);
    border-color: var(--accent);
  }
  .card h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .card .desc {
    font-size: 0.95rem;
    color: var(--text-secondary);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .card .links {
    margin-top: auto;
    display: flex;
    gap: 12px;
  }
  .card .links a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.25s ease;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: transparent;
  }
  [data-theme="simple"] .card .links a:hover {
    background: var(--accent);
    color: #fff;
  }
  [data-theme="animated"] .card .links a:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(124,92,252,0.35);
  }
  .card .links a svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
    flex-shrink: 0;
  }

  @media (max-width: 640px) {
    header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 1.2rem; }
    main { margin-top: 32px; gap: 20px; padding: 0 16px 40px; }
    .card { padding: 24px 20px; }
    .card h2 { font-size: 1.25rem; }
  }
</style>
</head>

<script>
  (function() {
    const body = document.body;
    const themeBtn = document.getElementById('theme-toggle');

    function syncModeIcon(mode) {

        modeBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      } else {
        modeBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      }
    }

    function setTheme(theme) {
      body.setAttribute('data-theme', theme);
      themeBtn.textContent = theme === 'simple' ? 'Switch to Animated' : 'Switch to Simple';
      try { localStorage.setItem('projects-portal-theme', theme); } catch {}
    }

    function setMode(mode) {
      body.setAttribute('data-mode', mode);
      syncModeIcon(mode);
      try { localStorage.setItem('projects-portal-mode', mode); } catch {}
    }

    themeBtn.addEventListener('click', function() {
      const cur = body.getAttribute('data-theme');
      setTheme(cur === 'simple' ? 'animated' : 'simple');
    });

    modeBtn.addEventListener('click', function() {
      const cur = body.getAttribute('data-mode') || 'light';
      setMode(cur === 'light' ? 'dark' : 'light');
    });

    try {
      const savedTheme = localStorage.getItem('projects-portal-theme');
      if (savedTheme === 'simple' || savedTheme === 'animated') {
        setTheme(savedTheme);
      }
      const savedMode = localStorage.getItem('projects-portal-mode');
      if (savedMode === 'light' || savedMode === 'dark') {
        setMode(savedMode);
      }
    } catch {}
  })();
</script>
</body>
</html>
